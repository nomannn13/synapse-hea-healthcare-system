<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Doctor Dashboard — Synapse HEA</title>
  <link rel="stylesheet" href="../css/pro-theme.css">
  <script src="../js/auth.js" defer></script>
</head>
<body class="app-body">
<header class="topbar">
  <div class="topbar-left">
    <button class="mobile-menu" id="menu-button">☰</button>
    <a class="brand-lockup" href="index.html"><span class="brand-mark">✚</span><span class="brand-text"><strong>Synapse HEA</strong><small>Doctor portal</small></span></a>
  </div>
  <div class="topbar-right"><span class="role-chip">Doctor</span><span id="top-user">Doctor</span><button class="logout" id="logout-button">Logout</button></div>
</header>
<div class="dash-layout">
  <aside id="sidebar" class="sidebar">
    <div class="side-profile"><div class="avatar" id="avatar">D</div><b id="side-name">Doctor</b><small>Clinical workspace</small></div>
    <div class="side-label">Doctor menu</div>
    <a class="side-link active" href="#">🏠 Dashboard</a>
    <a class="side-link" href="#appointments">📅 Appointments</a>
    <a class="side-link" href="#patients">👥 Patients</a>
  </aside>
  <main class="main">
    <section class="banner-card"><div><h2 id="greeting">Doctor dashboard</h2><p>Review appointment requests and manage patient care.</p></div><div class="banner-icon">👨‍⚕️</div></section>
    <section class="stats-grid">
      <article class="stat-card"><div class="stat-icon">📅</div><div><div id="today" class="stat-value">-</div><div class="stat-label">Today</div></div></article>
      <article class="stat-card"><div class="stat-icon">⏳</div><div><div id="upcoming" class="stat-value">-</div><div class="stat-label">Upcoming</div></div></article>
      <article class="stat-card"><div class="stat-icon">✅</div><div><div id="completed" class="stat-value">-</div><div class="stat-label">Completed</div></div></article>
      <article class="stat-card"><div class="stat-icon">👥</div><div><div id="patient-count" class="stat-value">-</div><div class="stat-label">Patients</div></div></article>
    </section>
    <section id="appointments" class="content-card">
      <div class="card-head"><h3>Upcoming appointments</h3><button class="refresh" id="refresh-button">Refresh</button></div>
      <div id="appointments-list" class="card-body"><div class="empty">Loading appointments...</div></div>
    </section>
  </main>
</div>
<div id="toast" class="toast"></div>
<script>
window.addEventListener('DOMContentLoaded', async () => {
  const session = HEA.requireRole('doctor');
  if (!session) return;

  const escape = HEA.escapeHtml;
  const name = session.user.name || 'Doctor';
  document.getElementById('top-user').textContent = name;
  document.getElementById('side-name').textContent = name;
  document.getElementById('avatar').textContent = name.split(' ').map((part) => part[0]).join('').slice(0, 2).toUpperCase();
  document.getElementById('greeting').textContent = `Good day, Dr. ${name.split(' ')[0]} 👋`;

  document.getElementById('menu-button').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
  document.getElementById('logout-button').addEventListener('click', () => {
    HEA.clearSession();
    location.href = 'login.html';
  });
  document.getElementById('refresh-button').addEventListener('click', loadDashboard);

  async function loadDashboard() {
    const list = document.getElementById('appointments-list');
    try {
      const result = await HEA.request('/doctor/dashboard');
      const stats = result.data.stats;
      document.getElementById('today').textContent = stats.today;
      document.getElementById('upcoming').textContent = stats.upcoming;
      document.getElementById('completed').textContent = stats.completed;
      document.getElementById('patient-count').textContent = stats.patients;

      const appointments = result.data.upcomingAppointments || [];
      list.innerHTML = appointments.length
        ? `<div class="list">${appointments.map((appointment) => `
            <div class="list-item">
              <div class="list-time"><b>${escape(appointment.appointment_date)}</b><small>${escape(String(appointment.appointment_time).slice(0,5))}</small></div>
              <div><b>${escape(appointment.patient_name)}</b><small>${escape(appointment.reason || 'Consultation')}</small></div>
              <span class="spacer"></span><span class="pill pill-info">${escape(appointment.status)}</span>
            </div>`).join('')}</div>`
        : '<div class="empty">No upcoming appointments.</div>';
    } catch (error) {
      list.innerHTML = `<div class="empty">${escape(error.message)}</div>`;
    }
  }

  loadDashboard();
});
</script>
</body>
</html>
