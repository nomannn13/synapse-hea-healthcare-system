spring:
  application:
    name: synapse-hea
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/synapse_hea?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:synapse}
    password: ${DB_PASSWORD:synapse_dev_password}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 3000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
  cache:
    type: redis
    redis:
      time-to-live: 10m
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: ${SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${SMTP_STARTTLS:false}
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: never

app:
  security:
    jwt-secret: ${JWT_SECRET:local-development-secret-change-before-production-123456}
    access-token-minutes: 15
    refresh-token-days: 14
    secure-cookies: ${SECURE_COOKIES:false}
    refresh-cookie-same-site: ${REFRESH_COOKIE_SAMESITE:Strict}
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  storage:
    root: ${DOCUMENT_STORAGE_ROOT:./data/uploads}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:no-reply@synapse.local}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: synapse-hea

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.synapse.hea: INFO
